name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: |
          mvn test \
            -Dbase.url=${{ secrets.APP_URL || 'http://localhost:5000' }} \
            -Dheadless=true \
            -Ddb.url="${{ secrets.DB_URL }}" \
            -Dapp.username="${{ secrets.APP_USERNAME }}" \
            -Dapp.password="${{ secrets.APP_PASSWORD }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Load existing reports from gh-pages
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Allure history
        if: always()
        run: |
          LATEST_REPORT=$(ls -d gh-pages/reports/*/ 2>/dev/null | sort -r | head -1)
          if [ -n "$LATEST_REPORT" ] && [ -d "${LATEST_REPORT}history" ]; then
            mkdir -p target/allure-results/history
            cp -r "${LATEST_REPORT}history"/* target/allure-results/history/ 2>/dev/null || true
          fi

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          mkdir -p target/allure-report/reports
          allure generate target/allure-results -o "target/allure-report/reports/$TIMESTAMP" --clean

      - name: Combine reports and keep last 20
        if: always()
        run: |
          REPORTS_DIR="target/allure-report/reports"

          # Copy existing reports from gh-pages
          if [ -d gh-pages/reports ]; then
            cp -r gh-pages/reports/* "$REPORTS_DIR/" 2>/dev/null || true
          fi

          # Keep only last 20 reports (sorted by name descending = newest first)
          cd "$REPORTS_DIR"
          ls -1 | sort -r | tail -n +21 | xargs -r rm -rf
          cd ../../..

          cat > target/allure-report/index.html << 'REPORTINDEX'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Allure Reports</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
              h1 { color: #333; }
              table { width: 100%; border-collapse: collapse; }
              th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
              th { background-color: #f5f5f5; }
              tr:hover { background-color: #f9f9f9; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .latest-badge { background: #28a745; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
            </style>
          </head>
          <body>
            <h1>Allure Test Reports</h1>
            <table>
              <tr><th>Report</th><th>Date</th></tr>
          REPORTINDEX

          for report in $(ls -1 "$REPORTS_DIR" | sort -r); do
            TIMESTAMP="${report#reports/}"
            DATE_PART="${TIMESTAMP:0:8}"
            TIME_PART="${TIMESTAMP:9:2}:${TIMESTAMP:11:2}:${TIMESTAMP:13:2}"
            FORMATTED_DATE="${DATE_PART:0:4}-${DATE_PART:4:2}-${DATE_PART:6:2} $TIME_PART"
            LATEST_TAG=""
            if [ "$report" = "$(ls -1 "$REPORTS_DIR" | sort -r | head -1)" ]; then
              LATEST_TAG=' <span class="latest-badge">latest</span>'
            fi
            echo "              <tr><td><a href=\"reports/$report/index.html\">$report</a>$LATEST_TAG</td><td>$FORMATTED_DATE</td></tr>" >> target/allure-report/index.html
          done

          cat >> target/allure-report/index.html << 'REPORTINDEXCLOSE'
            </table>
          </body>
          </html>
          REPORTINDEXCLOSE

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report
          force_orphan: false
